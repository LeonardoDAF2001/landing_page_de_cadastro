<!DOCTYPE html>
<html>
<head>

    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');
        body
        {
            margin: 0;
            background-color: #01015870;
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
            font-family: 'Inter' , sans-serif;
          /*  background-image: url("img/painel.svg");
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            background-position: center;*/


            
            display:flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #box
        {
            width: 550px;
            height: 500px;
            box-sizing: border-box;
            max-width: 550px;
            max-height: 500px;
            background-color: white;
            box-shadow: rgba(0, 0, 0, .212) 5px 5px 10px;      
            position: relative;

            
            animation-name: fadeIn1;
            animation-duration: 2s;
            animation-timing-function: ease-in-out;
            
            display:flex;
            align-items: center;
            justify-content: center;
        }


        @keyframes fadeIn1{
            0%{
                opacity: 0%;
                top:1000px;
                
            }
            75%{
                opacity: 80%;
                top:-100px;
                
            }
            100%{
                opacity: 100%;
                top:0px;
                
            }
        }
   

        #corpo{
            width: 100%;
        }
        

        #login
        {
            padding-left: 60px;
        }



        .login_text_input
        {
            width: 100%;
            height: 35px;
            font-size: 12pt;
            text-align: left;
            color:black;
            box-shadow: 1px 1px 5px rgba(0, 0, 0, .212);
            background-color: white;
            border-color: rgba(255, 255, 0, 0);
            border-radius: 15px;
            display: block;
            margin: 12px auto;
            padding-left: 20px;
        }
        .login_text_input:hover{
            background-color:#eeeeee75;
        }
         .login_text_input::placeholder{
            color: #0000001f;
        }
        

        .login_text_input:focus
        {
            outline: none;
            box-shadow: 1px 1px 5px rgba(0, 0, 0, .212), 0 0 0 2px #6c63ff;
        }


        .login_button
        {
            color:white;
            height: 40px;
            width: 80px;
            font-size: 15px;
            background-color: #6c63ff;
            border: none;
            border-radius: 5px;
            display: block;
            margin: 0 auto;
            padding: 10px;

        }

        .login_button:hover
        {
            background-color: #6c63fff1;
            cursor: pointer;
        }


        img
        {
            position: inherit;
            height: 400px;
            width: 400px;
            background-color: black;
        }
    
        #login h1{
            position: relative;
            top: -25px;
            text-align: left;
            font-size: 24pt;
            font-weight: bold;
        }

        #login h1::after{
            content: '';
            position:absolute;
            height: 5px;
            width: 80px;
            background-color: #6c63ff;
            border-radius: 10px;
            display: block;

        }


        .text_div
        {
            font-size: 12pt;
            font-weight: 500;
            text-align: left;
            width: 80%;
            display: block;
        }

        .cad
        {
            position: relative;
            top: 70px;
            width: 100%;
            display: grid;
            align-items: center;
            justify-content: center;

        }
        .cad a
        {

            text-align: center;
            color: #6c63ff;
            text-decoration: none;
        }

         .cad a:hover{
            color: #6b63ffb7;
        }

    </style>
    <title>Login</title>
</head>
<body>

<div id="box">
    <form id="corpo" class="formulario">
        <div id="login">
            <label><h1>Bem-vindo</h1></label>
            <div class="text_div">
            <label>Login</label>
            <input id="login_input1" class="login_text_input" type="text" placeholder="Digite seu login" required>
            </div>

            <div class="text_div">
            <label>Senha</label>
            <input id="login_inpukt2" class="login_text_input" type="password" placeholder="Digite sua senha" required>
            </div>  
        </div> 

        <input id="entrar" class="login_button" type="submit" value="Entrar">
        <div class="cad">
            <label>Não tem um cadastro? Clique no link abaixo.</label>
            <a id="cadastrar" href="index.html" target="_self">Cadastrar</a>
        </div>  
        
    </form>
    
</div>


</body>
</html>
